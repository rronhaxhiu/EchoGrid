services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-simuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-simpass}
      POSTGRES_DB: ${POSTGRES_DB:-simdb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-simuser} -d ${POSTGRES_DB:-simdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-simuser}:${POSTGRES_PASSWORD:-simpass}@postgres:5432/${POSTGRES_DB:-simdb}
      RUN_MIGRATIONS: "true"
      PEST_MODEL_DIR: /app/deployment_bundle/models
      PREDICTION_BACKEND: local
      PYTHONPATH: /app/deployment_bundle
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/app
      - ../deployment_bundle:/app/deployment_bundle:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ../frontend_v2
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend

volumes:
  pgdata:
